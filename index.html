<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub → jsDelivr Converter</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
  }

  .container {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #020617;
    color: white;
    resize: none;
    font-size: 14px;
  }

  button.main-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
    cursor: pointer;
  }

  .output-box {
    margin-top: 20px;
    background: #020617;
    border-radius: 10px;
    padding: 15px;
    position: relative;
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .copy-btn {
    background: #38bdf8;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }

  .output-text {
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .container {
      margin: 10px;
      padding: 15px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h2>GitHub → jsDelivr Converter 🚀</h2>

  <textarea id="input" placeholder="Paste GitHub links (one per line)..."></textarea>

  <button class="main-btn" onclick="convertLinks()">Convert</button>

  <div class="output-box">
    <div class="output-header">
      <span>Converted Links</span>
      <button class="copy-btn" onclick="copyOutput()">Copy Button</button>
    </div>
    <div class="output-text" id="output">Your results will appear here...</div>
  </div>
</div>

<script>
  const inputEl = document.getElementById("input");

  // Auto convert on paste/type
  inputEl.addEventListener("input", convertLinks);

  function convertSingle(link) {
    try {
      if (!link.includes("github.com")) return "❌ Invalid link";

      const parts = link.split("github.com/")[1].split("/");

      const user = parts[0];
      const repo = parts[1];
      const branch = parts[3];
      const path = parts.slice(4).join("/");

      return `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`;
    } catch {
      return "❌ Error";
    }
  }

  function convertLinks() {
    const input = inputEl.value.trim();

    if (!input) {
      document.getElementById("output").innerText = "Paste links above...";
      return;
    }

    const lines = input.split("\n");
    const results = lines.map(link => convertSingle(link.trim()));

    document.getElementById("output").innerText = results.join("\n");
  }

  function copyOutput() {
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied successfully!");
  }
</script>

</body>
</html>
